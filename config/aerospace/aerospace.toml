after-login-command = []

exec-on-workspace-change = ['/bin/bash', '-c',]

after-startup-command = []

# Start AeroSpace at login
start-at-login = true

# Normalizations.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 40

default-root-container-layout = 'accordion'

default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = true

[exec]
    inherit-env-vars = true

[key-mapping]
    preset = 'dvorak'

[gaps]
    inner.horizontal = 8
    inner.vertical =   5 
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

[mode.main.binding]
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
    alt-b = 'workspace B'
    alt-c = 'workspace C'
    alt-d = 'workspace D'
    alt-e = 'workspace E'
    # alt-f = 'workspace F' # Used for fullscreen and floating
    alt-g = 'workspace G'
    alt-i = 'workspace I'
    alt-m = 'workspace M'
    alt-n = 'workspace N'
    alt-o = 'workspace O'
    alt-p = 'workspace P'
    alt-q = 'workspace Q'
    alt-r = 'workspace R'
    # alt-s = 'workspace S' // used for service mode
    alt-t = 'workspace T'
    alt-u = 'workspace U'
    alt-v = 'workspace V'
    alt-w = 'workspace W'
    alt-x = 'workspace X'
    alt-y = 'workspace Y'
    alt-z = 'workspace Z'

    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-e = 'move-node-to-workspace E'
    # alt-shift-f = 'move-node-to-workspace F' used for fullscreen
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-r = 'move-node-to-workspace R' # taken by remote desktop
    # alt-shift-s = 'move-node-to-workspace S'
    alt-shift-t = 'move-node-to-workspace T' # taken by terminal
    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'
    alt-shift-y = 'move-node-to-workspace Y'
    alt-shift-z = 'move-node-to-workspace Z'

    # alt-enter = 'exec-and-forget open -na WezTerm'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-s= 'mode service'
    alt-shift-f = 'layout floating tiling'
    alt-f = 'fullscreen'

    cmd-h = [] # Disable "hide application"
    cmd-alt-h = [] # Disable "hide others"

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    alt-r = ['flatten-workspace-tree', 'mode main'] # reset layout
    alt-f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # open file in default text editor
    alt-c = ['exec-and-forget code ~/.aerospace.toml', 'mode main']
    alt-s = ['exec-and-forget ~/.redscripts/devstartup', 'mode main']
    alt-d = ['enable off']


    alt-e = ['layout tiling', 'exec-and-forget ~/.redscripts/launch_scrcpy.sh', 'mode main']
    alt-a = ['exec-and-forget ~/.redscripts/launch_avd.sh', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left']
    alt-shift-j = ['join-with down']
    alt-shift-k = ['join-with up']
    alt-shift-l = ['join-with right']

## Application workspace assignments
# Each application will be moved to a specific workspace

# W - browser
# P - credentials app
# C - work communications (Discord, Teams, Slack)
# O - outlook
# E - IDE
# G - gaming
# R - remote desktop
# T - telegram
# T - terminal
# J - Jit (Git but G was taken)
# A - slack
# M - music

[[on-window-detected]]
    if.window-title-regex-substring = '\d Reminder(s)?'
    run = ['layout floating']

# Browsers and Web Apps
[[on-window-detected]]
    if.app-id = 'company.thebrowser.Browser'
    run = ['move-node-to-workspace W']

# Telegram
[[on-window-detected]]
    if.app-id = 'ru.keepcoder.Telegram'
    run = ['move-node-to-workspace B']

# Terminal

[[on-window-detected]]
    if.app-id = 'com.apple.Terminal'
    run = ['move-node-to-workspace T']
[[on-window-detected]]
    if.app-id = 'com.googlecode.iterm2'
    run = ['move-node-to-workspace T']
[[on-window-detected]]
    if.app-id = 'dev.warp.Warp-Stable'
    run = ['layout tiling', 'move-node-to-workspace T']
[[on-window-detected]]
    if.app-id = 'net.kovidgoyal.kitty'
    run = ['move-node-to-workspace T']
[[on-window-detected]]
    if.app-name-regex-substring = 'wezterm-gui'
    run = []
[[on-window-detected]]
    if.app-id = 'com.github.wez.wezterm'
    run = []

# Communication
# Daily meeting
[[on-window-detected]]
    if.window-title-regex-substring = '.*Daily Meeting.*'
    run = ['layout floating', 'move-node-to-workspace C']

[[on-window-detected]]
    if.app-id = 'com.microsoft.teams2'
    run = ['move-node-to-workspace C']
[[on-window-detected]]
    if.app-id = 'com.hnc.Discord'
    run = ['move-node-to-workspace C']


# Slack
[[on-window-detected]]
    if.app-id = 'com.tinyspeck.slackmacgap'
    run = ['move-node-to-workspace A']

# Engineering
[[on-window-detected]]
    if.app-id = 'com.todesktop.230313mzl4w4u92' # Cursor lmao
    run = ['move-node-to-workspace E']

[[on-window-detected]]
    if.app-id = 'com.microsoft.VSCode'
    run = ['move-node-to-workspace E']

# Email
[[on-window-detected]]
    if.app-id = 'com.microsoft.Outlook'
    run = ['move-node-to-workspace O']

# Intelligence
[[on-window-detected]]
    if.app-id = 'com.openai.chat'
    # kinda makes sense, also I don't need all that space
    run = ['layout tiling', 'move-node-to-workspace T']
[[on-window-detected]]
    if.app-id = 'com.anthropic.claudefordesktop'
    run = ['move-node-to-workspace I']
[[on-window-detected]]
    if.app-id = 'com.openai.codex'
    run = ['move-node-to-workspace I']

# Notes
[[on-window-detected]]
    if.app-id = 'com.TickTick.task.mac'
    run = ['move-node-to-workspace N']
[[on-window-detected]]
    if.app-id = 'md.obsidian'
    run = ['move-node-to-workspace N']

# Gaming
[[on-window-detected]]
    if.app-id = 'net.battle.app'
    run = ['move-node-to-workspace G']
[[on-window-detected]]
    if.app-id = 'unity.Blizzard Entertainment.Hearthstone'
    run = ['layout floating', 'move-node-to-workspace G']
[[on-window-detected]]
    if.app-id = 'com.megacrit.SlayTheSpire2'
    run = ['move-node-to-workspace G']
# Remote Desktop
[[on-window-detected]]
    if.app-id = 'com.microsoft.rdc.macos'
    run = ['move-node-to-workspace R']
[[on-window-detected]]
    if.app-id = 'com.nomachine.nxdock'
    run = ['move-node-to-workspace R']

# Music
[[on-window-detected]]
    if.app-id = 'com.github.th-ch.youtube-music'
    run = ['move-node-to-workspace M']

[[on-window-detected]]
    if.app-id = 'com.DanPristupov.Fork'
    run = ['move-node-to-workspace 3']


# Float all windows by default
[[on-window-detected]]
    check-further-callbacks = true
    run = 'layout floating'

[workspace-to-monitor-force-assignment]
    C = 1
    M = 1
    O = 1   
    W = '^built-in retina display$'
    2 = '^built-in retina display$'
    B = '^built-in retina display$'
    R = 1
